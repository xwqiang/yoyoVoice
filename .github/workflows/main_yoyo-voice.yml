# Docs: https://github.com/Azure/webapps-deploy
# Python on App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - yoyo-voice

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  AZURE_WEBAPP_NAME: yoyo-voice

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Validate backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Prepare deployment package
        run: |
          chmod +x startup.sh
          rm -rf .git .github frontend/node_modules backend/.venv backend/.pytest_cache .pytest_cache
          mkdir -p data/audio
          zip -r release.zip .

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_55FA443D433C484185D42B2C15C59F58 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3C3B37A12DE545C29D89BAD0063BF63D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E7199A4C8EC84617A57589E82B67A6E6 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: release.zip
